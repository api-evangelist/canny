aid: canny
name: Canny
description: >-
  Canny is a customer feedback and product management platform that
  collects, organizes, and prioritizes feature requests from users and
  internal teams, ties them to roadmaps and changelogs, and surfaces
  product analytics. The Canny REST API exposes boards, posts, comments,
  votes, users, companies, categories, status changes, and tags so
  product teams can integrate feedback with CRMs, support tools, and
  issue trackers. Requests use a secret API key sent as a POST parameter
  apiKey or in the x-api-key header against the base URL
  https://canny.io/api/v1.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
